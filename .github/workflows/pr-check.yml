name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: bun check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify script.js is up-to-date
        run: |
          if ! git diff --quiet script.js; then
            echo "::error::script.js is out of date. Please run 'bun run build' and commit the result."
            exit 1
          fi

      - name: Run check
        run: bun run check
